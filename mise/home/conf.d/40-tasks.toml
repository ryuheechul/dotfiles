# [tasks.bootstrap] - `mise bootstrap` runs a task named "bootstrap"
# automatically, after [tools] are installed (and after [bootstrap.repos] /
# [dotfiles] have run, so tpm/doom-emacs/nvim's config are all in place by
# the time these commands run).

[tasks.bootstrap]
run = '''
# bat
bat cache --build || true

# base16
touch "$HOME/.base16_theme.updated-time"

# tmux (tpm plugin install) - tpm reads ~/.tmux.conf straight off disk and
# doesn't need a running server, so this never touches the tmux server at all
# (starting/killing one here would hit the same default socket as a live
# session already attached in the current terminal, killing it out from
# under you)
"$HOME/.tmux/plugins/tpm/bin/install_plugins" || true

# doom emacs - runs interactively (no `yes |`): straight.el's prompts aren't
# all y/n (e.g. a numbered menu when a package's recipe points at a new git
# remote), and blindly answering "y" to those just loops forever since "y"
# never matches a valid choice - needs `mise bootstrap --raw`/`mise run
# --raw` for these prompts to actually reach a real terminal.
# SKIP_INSTALL_DOOM lets non-interactive/throwaway setups (containers,
# dotfiles-launchpad) opt out - those prompts can't be answered there anyway,
# so doom install would only hang or loop (mirrors SKIP_INSTALL_VIM_PLUGINS
# below).
if [ -n "$SKIP_INSTALL_DOOM" ]; then
  echo "doom emacs: skipping install (SKIP_INSTALL_DOOM set)"
elif command -v emacs >/dev/null 2>&1; then
  "$HOME/.doom-emacs.d/bin/doom" install || true
else
  echo "doom emacs: skipping install, emacs not found on PATH"
fi

# nvim
if [ -z "$SKIP_INSTALL_VIM_PLUGINS" ]; then
  nvim --headless "+Lazy! sync" +qa
  nvim --headless -c 'UpdateRemotePlugins' -c q || true
fi

# zsh (zinit) - source it now to install missing zsh plugins during
# bootstrap instead of on first interactive shell startup
zsh -c "source '$HOME/.config/dfs-rhc/zsh/my_addons/zinit'"
'''
