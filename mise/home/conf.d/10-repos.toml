# [bootstrap.repos] - cloned before [dotfiles] is applied.
# ref is pinned explicitly to each repo's actual default branch so mise
# converges (pulls) to the branch tip on every `mise bootstrap` run,
# matching this repo's previous `git clone || (cd X && git pull)` behavior.

[bootstrap.repos]
"~/.config/base16-shell" = { url = "https://github.com/chriskempson/base16-shell.git", ref = "master" }
"~/.tmux/plugins/tpm" = { url = "https://github.com/tmux-plugins/tpm.git", ref = "master" }
"~/.emacs.d" = { url = "https://github.com/plexus/chemacs2.git", ref = "main" }
"~/.spacemacs.d" = { url = "https://github.com/syl20bnr/spacemacs.git", ref = "develop" }
"~/.doom-emacs.d" = { url = "https://github.com/hlissner/doom-emacs.git", ref = "master" }

[bootstrap.hooks.pre-repos]
# `repos apply`'s dirty-check treats untracked local changes as blocking, so
# each of these clears a runtime-generated dir/cache before it runs
run = '''
# zsh compiles sourced scripts into *.zwc byte-code caches as a side effect of normal shell startup
rm -f ~/.config/base16-shell/*.zwc
# chemacs2 writes CLI startup logs here at runtime (no compiled elisp/eln-cache - that lives in ~/.doom-emacs.d)
rm -rf ~/.emacs.d/.local
'''

[bootstrap.hooks.post-repos]
# doom-emacs.d's sources/doom+ is a git submodule - a plain clone/pull never
# initializes it, leaving `doom doctor`/`doom sync` unable to find its
# modules directory at all. runs unconditionally (all platforms), so it has
# to come before the WSL-only early exit below
#
# wsl-sudo clone is WSL-only - [bootstrap.repos] has no os-conditional field
# (unlike [tools]), so this stays as a guarded hook instead
run = '''
git -C "$HOME/.doom-emacs.d" submodule update --init --recursive

test -n "$WSL_DISTRO_NAME" || exit 0
test -d "$HOME/.wsl-sudo" && exit 0
git clone https://github.com/Chronial/wsl-sudo.git "$HOME/.wsl-sudo"
'''
